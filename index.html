<!DOCTYPE html>
<!--
	MAINTAINER NOTE: Every time you change this file, update the hardcoded
	version stamp below (#version, format "version: HH:mm") so mobile cache
	checks show the latest build time.
-->
<html lang="en">
	<head>
		<title>three.js ar - hit test</title>
		<meta charset="utf-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
		<meta property="og:title" content="three.js ar - hit test">
		<meta property="og:type" content="website">
		<meta property="og:url" content="https://threejs.org/examples/webxr_ar_hittest.html">
		<meta property="og:image" content="https://threejs.org/examples/screenshots/webxr_ar_hittest.jpg">
		<style>
			body { margin: 0; }
			#version {
				position: fixed;
				top: 0;
				left: 0;
				right: 0;
				z-index: 10000;
				padding: 14px 10px;
				text-align: center;
				font-family: monospace;
				font-size: 18px;
				font-weight: 700;
				color: #fff;
				background: rgba(0, 0, 0, 0.9);
				pointer-events: none;
			}

			#info {
				position: fixed;
				top: 52px;
				width: 100%;
				padding: 10px;
				box-sizing: border-box;
				text-align: center;
				z-index: 10000;
				color: #fff;
				font-family: monospace;
				font-size: 13px;
				line-height: 24px;
				pointer-events: none;
				text-shadow: 0 1px 3px rgba(0, 0, 0, 0.9);
			}
			#info a { pointer-events: auto; color: #fff; }

			#ARButton {
				opacity: 1 !important;
				width: auto !important;
				min-width: 260px !important;
				left: 50% !important;
				transform: translateX(-50%);
				bottom: 32px !important;
				padding: 16px 28px !important;
				font-size: 16px !important;
				font-weight: 700 !important;
				letter-spacing: 0.06em;
				color: #fff !important;
				background: #2563eb !important;
				border: 2px solid #fff !important;
				border-radius: 12px !important;
				box-shadow: 0 4px 24px rgba(0, 0, 0, 0.45);
			}

			#ARButton:active {
				background: #1d4ed8 !important;
				transform: translateX(-50%) scale(0.98);
			}

			#home-screen {
				position: fixed;
				inset: 0;
				z-index: 9999;
				display: flex;
				flex-direction: column;
				pointer-events: none;
			}

			#home-screen.hidden {
				display: none;
			}

			#mini-game-picker {
				pointer-events: auto;
				margin: 60px 16px 0;
				padding: 14px 16px;
				background: rgba(0, 0, 0, 0.85);
				border: 1px solid rgba(255, 255, 255, 0.25);
				border-radius: 12px;
				color: #fff;
				font-family: system-ui, sans-serif;
			}

			#mini-game-picker label {
				display: block;
				margin-bottom: 8px;
				font-size: 12px;
				font-weight: 600;
				letter-spacing: 0.04em;
				text-transform: uppercase;
				opacity: 0.75;
			}

			#mini-game-select {
				width: 100%;
				padding: 12px 14px;
				font-size: 16px;
				font-weight: 600;
				color: #fff;
				background: #1e293b;
				border: 1px solid rgba(255, 255, 255, 0.2);
				border-radius: 8px;
				appearance: none;
				cursor: pointer;
			}

			#ar-dom-overlay {
				display: none;
				position: fixed;
				inset: 0;
				z-index: 10001;
				pointer-events: none;
			}

			#ar-overlay-exit {
				position: absolute;
				top: 20px;
				right: 20px;
				width: 38px;
				height: 38px;
				pointer-events: auto;
				cursor: pointer;
			}

			#ar-overlay-exit path {
				stroke: #fff;
				stroke-width: 2;
			}

			#world-builder-ui {
				position: absolute;
				top: 68px;
				right: 12px;
				min-width: 160px;
				padding: 12px 14px;
				background: rgba(0, 0, 0, 0.85);
				border: 1px solid rgba(255, 255, 255, 0.25);
				border-radius: 12px;
				color: #fff;
				font-family: system-ui, sans-serif;
				pointer-events: auto;
			}

			#world-builder-ui.hidden {
				display: none;
			}

			#world-builder-ui label {
				display: block;
				margin-bottom: 8px;
				font-size: 12px;
				font-weight: 600;
				letter-spacing: 0.04em;
				text-transform: uppercase;
				opacity: 0.75;
			}

			#world-builder-object-select {
				width: 100%;
				padding: 10px 12px;
				font-size: 15px;
				font-weight: 600;
				color: #fff;
				background: #1e293b;
				border: 1px solid rgba(255, 255, 255, 0.2);
				border-radius: 8px;
				appearance: none;
				cursor: pointer;
			}
		</style>
	</head>
	<body>

		<!-- REQUIRED on every edit: bump version to current local time (HH:mm). See file header note. -->
		<div id="version">version: 11:55</div>

		<div id="ar-dom-overlay">
			<svg id="ar-overlay-exit" width="38" height="38" viewBox="0 0 40 40" aria-label="Exit AR" role="button">
				<path d="M 12,12 L 28,28 M 28,12 12,28"></path>
			</svg>
			<div id="world-builder-ui" class="hidden">
				<label for="world-builder-object-select">Objects</label>
				<select id="world-builder-object-select" aria-label="Choose object to place"></select>
			</div>
		</div>

		<div id="home-screen">
			<div id="mini-game-picker">
				<label for="mini-game-select">AR mini game</label>
				<select id="mini-game-select" aria-label="Choose AR mini game"></select>
			</div>
		</div>

		<div id="info">
			<a href="https://threejs.org" target="_blank" rel="noopener">three.js</a> ar - hit test<br/>
		</div>

		<script type="importmap">
			{
				"imports": {
					"three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
					"three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
				}
			}
		</script>

		<script type="module">

			import * as THREE from 'three';
			import { ARButton } from 'three/addons/webxr/ARButton.js';

			let container;
			let camera, scene, renderer;
			let controller1, controller2;

			const persistentSceneObjects = new Set();

			let activeMiniGame = null;
			let selectedMiniGameId = 'world-builder';

			const miniGames = {};
			const AR_START_LABEL = 'START AR MINI GAME';

			init();

			function init() {

				container = document.createElement( 'div' );
				document.body.appendChild( container );

				scene = new THREE.Scene();

				camera = new THREE.PerspectiveCamera( 70, window.innerWidth / window.innerHeight, 0.01, 20 );

				const light = new THREE.HemisphereLight( 0xffffff, 0xbbbbff, 3 );
				light.position.set( 0.5, 1, 0.25 );
				scene.add( light );
				persistentSceneObjects.add( light );

				//

				renderer = new THREE.WebGLRenderer( { antialias: true, alpha: true } );
				renderer.setPixelRatio( window.devicePixelRatio );
				renderer.setSize( window.innerWidth, window.innerHeight );
				renderer.setAnimationLoop( animate );
				renderer.xr.enabled = true;
				container.appendChild( renderer.domElement );

				//

				setupArDomOverlay();

				document.body.appendChild( ARButton.createButton( renderer, {
					requiredFeatures: [ 'hit-test' ],
					optionalFeatures: [ 'dom-overlay' ],
					domOverlay: { root: document.getElementById( 'ar-dom-overlay' ) }
				} ) );

				controller1 = renderer.xr.getController( 0 );
				scene.add( controller1 );
				persistentSceneObjects.add( controller1 );

				controller2 = renderer.xr.getController( 1 );
				scene.add( controller2 );
				persistentSceneObjects.add( controller2 );

				registerMiniGame( createHitTestPlacementGame( {
					id: 'world-builder',
					label: 'World Builder',
					objectPicker: {
						uiId: 'world-builder-ui',
						selectId: 'world-builder-object-select',
						defaultObject: 'trees',
						objects: {
							trees: { label: 'Trees', createPlacement: createTree, uniformScale: true },
							'fence-segment': { label: 'Fence segment', createPlacement: createFenceSegment }
						}
					}
				} ) );

				registerMiniGame( createHitTestPlacementGame( {
					id: 'cuboids',
					label: 'Cuboids',
					createPlacement: () => new THREE.Mesh(
						new THREE.BoxGeometry( 0.2, 0.2, 0.2 ).translate( 0, 0.1, 0 ),
						new THREE.MeshPhongMaterial( { color: 0xffffff * Math.random() } )
					)
				} ) );

				setupHomeScreen();
				setupXRSessionHandlers();

				window.addEventListener( 'resize', onWindowResize );

			}

			function setupArDomOverlay() {

				document.getElementById( 'ar-overlay-exit' ).addEventListener( 'click', () => {

					const session = renderer.xr.getSession();
					if ( session ) session.end();

				} );

			}

			function registerMiniGame( game ) {

				miniGames[ game.id ] = game;

			}

			function setupHomeScreen() {

				const select = document.getElementById( 'mini-game-select' );

				for ( const id of Object.keys( miniGames ) ) {

					const option = document.createElement( 'option' );
					option.value = id;
					option.textContent = miniGames[ id ].label;
					select.appendChild( option );

				}

				select.value = selectedMiniGameId;

				select.addEventListener( 'change', () => {

					selectedMiniGameId = select.value;

				} );

				const arButton = document.getElementById( 'ARButton' );
				if ( arButton ) {

					arButton.style.pointerEvents = 'auto';
					customizeARButtonLabel( arButton );

				}

			}

			function customizeARButtonLabel( arButton ) {

				function applyStartLabel() {

					if ( arButton.textContent === 'START AR' ) {

						arButton.textContent = AR_START_LABEL;

					}

				}

				applyStartLabel();

				const observer = new MutationObserver( applyStartLabel );
				observer.observe( arButton, { childList: true, characterData: true, subtree: true } );

			}

			function resetSceneForHomeScreen() {

				const objectsToRemove = scene.children.filter( ( child ) => ! persistentSceneObjects.has( child ) );
				const disposedGeometries = new Set();

				for ( const object of objectsToRemove ) {

					scene.remove( object );

					object.traverse( ( node ) => {

						if ( node.material ) {

							if ( Array.isArray( node.material ) ) {

								node.material.forEach( ( material ) => material.dispose() );

							} else {

								node.material.dispose();

							}

						}

						if ( node.geometry && ! disposedGeometries.has( node.geometry ) ) {

							node.geometry.dispose();
							disposedGeometries.add( node.geometry );

						}

					} );

				}

			}

			function setupXRSessionHandlers() {

				const homeScreen = document.getElementById( 'home-screen' );
				const miniGameSelect = document.getElementById( 'mini-game-select' );

				renderer.xr.addEventListener( 'sessionstart', () => {

					homeScreen.classList.add( 'hidden' );
					miniGameSelect.disabled = true;

					activeMiniGame = miniGames[ selectedMiniGameId ].create( {
						scene,
						renderer,
						controller1,
						controller2
					} );
					activeMiniGame.onSessionStart();

				} );

				renderer.xr.addEventListener( 'sessionend', () => {

					if ( activeMiniGame ) {

						activeMiniGame.onSessionEnd();
						activeMiniGame = null;

					}

					resetSceneForHomeScreen();

					homeScreen.classList.remove( 'hidden' );
					miniGameSelect.disabled = false;

					const arButton = document.getElementById( 'ARButton' );
					if ( arButton && arButton.textContent === 'START AR' ) {

						arButton.textContent = AR_START_LABEL;

					}

				} );

			}

			function createFenceSegment() {

				const fence = new THREE.Group();
				const wood = new THREE.MeshPhongMaterial( { color: 0x8b6914 } );

				const postGeometry = new THREE.BoxGeometry( 0.04, 0.4, 0.04 );

				for ( const x of [ - 0.28, 0.28 ] ) {

					const post = new THREE.Mesh( postGeometry, wood );
					post.position.set( x, 0.2, 0 );
					fence.add( post );

				}

				for ( let i = 0; i < 3; i ++ ) {

					const rail = new THREE.Mesh(
						new THREE.BoxGeometry( 0.6, 0.03, 0.025 ),
						wood
					);
					rail.position.y = 0.1 + i * 0.14;
					fence.add( rail );

				}

				return fence;

			}

			function createTree() {

				const tree = new THREE.Group();

				const trunk = new THREE.Mesh(
					new THREE.CylinderGeometry( 0.03, 0.05, 0.14, 8 ),
					new THREE.MeshPhongMaterial( { color: 0x5c4033 } )
				);
				trunk.position.y = 0.07;
				tree.add( trunk );

				const green = 0x2d6a4f + Math.floor( Math.random() * 0x151510 );
				const foliage = new THREE.Mesh(
					new THREE.ConeGeometry( 0.16, 0.28, 8 ),
					new THREE.MeshPhongMaterial( { color: green } )
				);
				foliage.position.y = 0.28;
				tree.add( foliage );

				const foliageTop = new THREE.Mesh(
					new THREE.ConeGeometry( 0.11, 0.18, 8 ),
					new THREE.MeshPhongMaterial( { color: green + 0x080808 } )
				);
				foliageTop.position.y = 0.46;
				tree.add( foliageTop );

				tree.scale.set( 1, 3, 1 );

				return tree;

			}

			function createHitTestPlacementGame( { id, label, createPlacement, uniformScale = false, objectPicker = null } ) {

				function create( { scene, renderer, controller1, controller2 } ) {

					let reticle;
					let hitTestSource = null;
					let hitTestSourceRequested = false;
					let activeObjectId = objectPicker ? objectPicker.defaultObject : null;
					let objectPickerElement = null;
					let objectSelectElement = null;
					let objectSelectHandler = null;

					function getPlacementObject() {

						if ( objectPicker ) {

							return objectPicker.objects[ activeObjectId ].createPlacement();

						}

						return createPlacement();

					}

					function shouldUniformScale() {

						if ( objectPicker ) {

							return !! objectPicker.objects[ activeObjectId ].uniformScale;

						}

						return uniformScale;

					}

					function showObjectPicker() {

						objectPickerElement = document.getElementById( objectPicker.uiId );
						objectSelectElement = document.getElementById( objectPicker.selectId );

						objectSelectElement.replaceChildren();

						for ( const objectId of Object.keys( objectPicker.objects ) ) {

							const option = document.createElement( 'option' );
							option.value = objectId;
							option.textContent = objectPicker.objects[ objectId ].label;
							objectSelectElement.appendChild( option );

						}

						activeObjectId = objectPicker.defaultObject;
						objectSelectElement.value = activeObjectId;

						objectSelectHandler = () => {

							activeObjectId = objectSelectElement.value;

						};

						objectSelectElement.addEventListener( 'change', objectSelectHandler );
						objectPickerElement.classList.remove( 'hidden' );

					}

					function hideObjectPicker() {

						if ( objectSelectElement && objectSelectHandler ) {

							objectSelectElement.removeEventListener( 'change', objectSelectHandler );

						}

						objectSelectHandler = null;

						if ( objectPickerElement ) {

							objectPickerElement.classList.add( 'hidden' );

						}

						activeObjectId = objectPicker.defaultObject;

					}

					function onSelect() {

						if ( reticle.visible ) {

							const object = getPlacementObject();
							reticle.matrix.decompose( object.position, object.quaternion, object.scale );

							if ( shouldUniformScale() ) {

								const scale = Math.random() * 1.2 + 0.8;
								object.scale.set( scale, scale, scale );

							} else if ( ! objectPicker ) {

								object.scale.y = Math.random() * 2 + 1;

							}

							scene.add( object );

						}

					}

					controller1.addEventListener( 'select', onSelect );
					controller2.addEventListener( 'select', onSelect );

					reticle = new THREE.Mesh(
						new THREE.RingGeometry( 0.15, 0.2, 32 ).rotateX( - Math.PI / 2 ),
						new THREE.MeshBasicMaterial()
					);
					reticle.matrixAutoUpdate = false;
					reticle.visible = false;
					scene.add( reticle );

					return {

						onSessionStart() {

							hitTestSourceRequested = false;
							hitTestSource = null;

							if ( objectPicker ) {

								showObjectPicker();

							}

						},

						onSessionEnd() {

							controller1.removeEventListener( 'select', onSelect );
							controller2.removeEventListener( 'select', onSelect );

							if ( hitTestSource ) {

								hitTestSource.cancel();
								hitTestSource = null;

							}

							hitTestSourceRequested = false;

							if ( objectPicker ) {

								hideObjectPicker();

							}

						},

						onFrame( timestamp, frame ) {

							if ( ! frame ) return;

							const referenceSpace = renderer.xr.getReferenceSpace();
							const session = renderer.xr.getSession();

							if ( hitTestSourceRequested === false ) {

								session.requestReferenceSpace( 'viewer' ).then( function ( referenceSpace ) {

									session.requestHitTestSource( { space: referenceSpace } ).then( function ( source ) {

										hitTestSource = source;

									} );

								} );

								session.addEventListener( 'end', function () {

									hitTestSourceRequested = false;
									hitTestSource = null;

								} );

								hitTestSourceRequested = true;

							}

							if ( hitTestSource ) {

								const hitTestResults = frame.getHitTestResults( hitTestSource );

								if ( hitTestResults.length ) {

									const hit = hitTestResults[ 0 ];

									reticle.visible = true;
									reticle.matrix.fromArray( hit.getPose( referenceSpace ).transform.matrix );

								} else {

									reticle.visible = false;

								}

							}

						}

					};

				}

				return { id, label, create };

			}

			function onWindowResize() {

				camera.aspect = window.innerWidth / window.innerHeight;
				camera.updateProjectionMatrix();

				renderer.setSize( window.innerWidth, window.innerHeight );

			}

			//

			function animate( timestamp, frame ) {

				if ( activeMiniGame ) {

					activeMiniGame.onFrame( timestamp, frame );

				}

				renderer.render( scene, camera );

			}

		</script>
	</body>
</html>
