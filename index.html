<!DOCTYPE html>
<!--
	MAINTAINER NOTE: Every time you change this file, update the hardcoded
	version stamp below (#version, format "version: HH:mm") so mobile cache
	checks show the latest build time.
-->
<html lang="en">
	<head>
		<title>three.js ar - hit test</title>
		<meta charset="utf-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
		<meta property="og:title" content="three.js ar - hit test">
		<meta property="og:type" content="website">
		<meta property="og:url" content="https://threejs.org/examples/webxr_ar_hittest.html">
		<meta property="og:image" content="https://threejs.org/examples/screenshots/webxr_ar_hittest.jpg">
		<style>
			body { margin: 0; }
			#version {
				position: fixed;
				top: 0;
				left: 0;
				right: 0;
				z-index: 10000;
				padding: 14px 10px;
				text-align: center;
				font-family: monospace;
				font-size: 18px;
				font-weight: 700;
				color: #fff;
				background: rgba(0, 0, 0, 0.9);
				pointer-events: none;
			}

			#info {
				position: fixed;
				top: 52px;
				width: 100%;
				padding: 10px;
				box-sizing: border-box;
				text-align: center;
				z-index: 10000;
				color: #fff;
				font-family: monospace;
				font-size: 13px;
				line-height: 24px;
				pointer-events: none;
				text-shadow: 0 1px 3px rgba(0, 0, 0, 0.9);
			}
			#info a { pointer-events: auto; color: #fff; }

			#ARButton {
				opacity: 1 !important;
				width: auto !important;
				min-width: 260px !important;
				left: 50% !important;
				transform: translateX(-50%);
				bottom: 32px !important;
				padding: 16px 28px !important;
				font-size: 16px !important;
				font-weight: 700 !important;
				letter-spacing: 0.06em;
				color: #fff !important;
				background: #2563eb !important;
				border: 2px solid #fff !important;
				border-radius: 12px !important;
				box-shadow: 0 4px 24px rgba(0, 0, 0, 0.45);
			}

			#ARButton:active {
				background: #1d4ed8 !important;
				transform: translateX(-50%) scale(0.98);
			}

			#home-screen {
				position: fixed;
				inset: 0;
				z-index: 9999;
				display: flex;
				flex-direction: column;
				pointer-events: none;
			}

			#home-screen.hidden {
				display: none;
			}

			#mini-game-picker {
				pointer-events: auto;
				margin: 60px 16px 0;
				padding: 14px 16px;
				background: rgba(0, 0, 0, 0.85);
				border: 1px solid rgba(255, 255, 255, 0.25);
				border-radius: 12px;
				color: #fff;
				font-family: system-ui, sans-serif;
			}

			#mini-game-picker label {
				display: block;
				margin-bottom: 8px;
				font-size: 12px;
				font-weight: 600;
				letter-spacing: 0.04em;
				text-transform: uppercase;
				opacity: 0.75;
			}

			#mini-game-select {
				width: 100%;
				padding: 12px 14px;
				font-size: 16px;
				font-weight: 600;
				color: #fff;
				background: #1e293b;
				border: 1px solid rgba(255, 255, 255, 0.2);
				border-radius: 8px;
				appearance: none;
				cursor: pointer;
			}
		</style>
	</head>
	<body>

		<!-- REQUIRED on every edit: bump version to current local time (HH:mm). See file header note. -->
		<div id="version">version: 11:31</div>

		<div id="home-screen">
			<div id="mini-game-picker">
				<label for="mini-game-select">AR mini game</label>
				<select id="mini-game-select" aria-label="Choose AR mini game"></select>
			</div>
		</div>

		<div id="info">
			<a href="https://threejs.org" target="_blank" rel="noopener">three.js</a> ar - hit test<br/>
		</div>

		<script type="importmap">
			{
				"imports": {
					"three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
					"three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
				}
			}
		</script>

		<script type="module">

			import * as THREE from 'three';
			import { ARButton } from 'three/addons/webxr/ARButton.js';

			let container;
			let camera, scene, renderer;
			let controller1, controller2;

			const persistentSceneObjects = new Set();

			let activeMiniGame = null;
			let selectedMiniGameId = 'cylinders';

			const miniGames = {};
			const AR_START_LABEL = 'START AR MINI GAME';

			init();

			function init() {

				container = document.createElement( 'div' );
				document.body.appendChild( container );

				scene = new THREE.Scene();

				camera = new THREE.PerspectiveCamera( 70, window.innerWidth / window.innerHeight, 0.01, 20 );

				const light = new THREE.HemisphereLight( 0xffffff, 0xbbbbff, 3 );
				light.position.set( 0.5, 1, 0.25 );
				scene.add( light );
				persistentSceneObjects.add( light );

				//

				renderer = new THREE.WebGLRenderer( { antialias: true, alpha: true } );
				renderer.setPixelRatio( window.devicePixelRatio );
				renderer.setSize( window.innerWidth, window.innerHeight );
				renderer.setAnimationLoop( animate );
				renderer.xr.enabled = true;
				container.appendChild( renderer.domElement );

				//

				document.body.appendChild( ARButton.createButton( renderer, { requiredFeatures: [ 'hit-test' ] } ) );

				controller1 = renderer.xr.getController( 0 );
				scene.add( controller1 );
				persistentSceneObjects.add( controller1 );

				controller2 = renderer.xr.getController( 1 );
				scene.add( controller2 );
				persistentSceneObjects.add( controller2 );

				registerMiniGame( createHitTestPlacementGame( {
					id: 'cylinders',
					label: 'Cylinders',
					createPlacementGeometry: () => new THREE.CylinderGeometry( 0.1, 0.1, 0.2, 32 ).translate( 0, 0.1, 0 )
				} ) );

				registerMiniGame( createHitTestPlacementGame( {
					id: 'cuboids',
					label: 'Cuboids',
					createPlacementGeometry: () => new THREE.BoxGeometry( 0.2, 0.2, 0.2 ).translate( 0, 0.1, 0 )
				} ) );

				setupHomeScreen();
				setupXRSessionHandlers();

				window.addEventListener( 'resize', onWindowResize );

			}

			function registerMiniGame( game ) {

				miniGames[ game.id ] = game;

			}

			function setupHomeScreen() {

				const select = document.getElementById( 'mini-game-select' );

				for ( const id of Object.keys( miniGames ) ) {

					const option = document.createElement( 'option' );
					option.value = id;
					option.textContent = miniGames[ id ].label;
					select.appendChild( option );

				}

				select.value = selectedMiniGameId;

				select.addEventListener( 'change', () => {

					selectedMiniGameId = select.value;

				} );

				const arButton = document.getElementById( 'ARButton' );
				if ( arButton ) {

					arButton.style.pointerEvents = 'auto';
					customizeARButtonLabel( arButton );

				}

			}

			function customizeARButtonLabel( arButton ) {

				function applyStartLabel() {

					if ( arButton.textContent === 'START AR' ) {

						arButton.textContent = AR_START_LABEL;

					}

				}

				applyStartLabel();

				const observer = new MutationObserver( applyStartLabel );
				observer.observe( arButton, { childList: true, characterData: true, subtree: true } );

			}

			function resetSceneForHomeScreen() {

				const objectsToRemove = scene.children.filter( ( child ) => ! persistentSceneObjects.has( child ) );
				const disposedGeometries = new Set();

				for ( const object of objectsToRemove ) {

					scene.remove( object );

					object.traverse( ( node ) => {

						if ( node.material ) {

							if ( Array.isArray( node.material ) ) {

								node.material.forEach( ( material ) => material.dispose() );

							} else {

								node.material.dispose();

							}

						}

						if ( node.geometry && ! disposedGeometries.has( node.geometry ) ) {

							node.geometry.dispose();
							disposedGeometries.add( node.geometry );

						}

					} );

				}

			}

			function setupXRSessionHandlers() {

				const homeScreen = document.getElementById( 'home-screen' );
				const miniGameSelect = document.getElementById( 'mini-game-select' );

				renderer.xr.addEventListener( 'sessionstart', () => {

					homeScreen.classList.add( 'hidden' );
					miniGameSelect.disabled = true;

					activeMiniGame = miniGames[ selectedMiniGameId ].create( {
						scene,
						renderer,
						controller1,
						controller2
					} );
					activeMiniGame.onSessionStart();

				} );

				renderer.xr.addEventListener( 'sessionend', () => {

					if ( activeMiniGame ) {

						activeMiniGame.onSessionEnd();
						activeMiniGame = null;

					}

					resetSceneForHomeScreen();

					homeScreen.classList.remove( 'hidden' );
					miniGameSelect.disabled = false;

					const arButton = document.getElementById( 'ARButton' );
					if ( arButton && arButton.textContent === 'START AR' ) {

						arButton.textContent = AR_START_LABEL;

					}

				} );

			}

			function createHitTestPlacementGame( { id, label, createPlacementGeometry } ) {

				function create( { scene, renderer, controller1, controller2 } ) {

					let reticle;
					let hitTestSource = null;
					let hitTestSourceRequested = false;

					const geometry = createPlacementGeometry();

					function onSelect() {

						if ( reticle.visible ) {

							const material = new THREE.MeshPhongMaterial( { color: 0xffffff * Math.random() } );
							const mesh = new THREE.Mesh( geometry, material );
							reticle.matrix.decompose( mesh.position, mesh.quaternion, mesh.scale );
							mesh.scale.y = Math.random() * 2 + 1;
							scene.add( mesh );

						}

					}

					controller1.addEventListener( 'select', onSelect );
					controller2.addEventListener( 'select', onSelect );

					reticle = new THREE.Mesh(
						new THREE.RingGeometry( 0.15, 0.2, 32 ).rotateX( - Math.PI / 2 ),
						new THREE.MeshBasicMaterial()
					);
					reticle.matrixAutoUpdate = false;
					reticle.visible = false;
					scene.add( reticle );

					return {

						onSessionStart() {

							hitTestSourceRequested = false;
							hitTestSource = null;

						},

						onSessionEnd() {

							controller1.removeEventListener( 'select', onSelect );
							controller2.removeEventListener( 'select', onSelect );

							if ( hitTestSource ) {

								hitTestSource.cancel();
								hitTestSource = null;

							}

							hitTestSourceRequested = false;

						},

						onFrame( timestamp, frame ) {

							if ( ! frame ) return;

							const referenceSpace = renderer.xr.getReferenceSpace();
							const session = renderer.xr.getSession();

							if ( hitTestSourceRequested === false ) {

								session.requestReferenceSpace( 'viewer' ).then( function ( referenceSpace ) {

									session.requestHitTestSource( { space: referenceSpace } ).then( function ( source ) {

										hitTestSource = source;

									} );

								} );

								session.addEventListener( 'end', function () {

									hitTestSourceRequested = false;
									hitTestSource = null;

								} );

								hitTestSourceRequested = true;

							}

							if ( hitTestSource ) {

								const hitTestResults = frame.getHitTestResults( hitTestSource );

								if ( hitTestResults.length ) {

									const hit = hitTestResults[ 0 ];

									reticle.visible = true;
									reticle.matrix.fromArray( hit.getPose( referenceSpace ).transform.matrix );

								} else {

									reticle.visible = false;

								}

							}

						}

					};

				}

				return { id, label, create };

			}

			function onWindowResize() {

				camera.aspect = window.innerWidth / window.innerHeight;
				camera.updateProjectionMatrix();

				renderer.setSize( window.innerWidth, window.innerHeight );

			}

			//

			function animate( timestamp, frame ) {

				if ( activeMiniGame ) {

					activeMiniGame.onFrame( timestamp, frame );

				}

				renderer.render( scene, camera );

			}

		</script>
	</body>
</html>
