<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Artest</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #334155 100%);
      color: #f8fafc;
      padding: 2rem;
      text-align: center;
    }

    h1 {
      font-size: clamp(2rem, 6vw, 3rem);
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: 0.75rem;
    }

    p {
      font-size: 1.125rem;
      color: #94a3b8;
      max-width: 28rem;
      line-height: 1.6;
      margin-bottom: 2rem;
    }

    a {
      display: inline-block;
      padding: 0.75rem 1.5rem;
      background: #3b82f6;
      color: #fff;
      text-decoration: none;
      font-weight: 600;
      border-radius: 0.5rem;
      transition: background 0.2s, transform 0.15s;
    }

    a:hover {
      background: #2563eb;
      transform: translateY(-2px);
    }

    footer {
      position: absolute;
      bottom: 1.5rem;
      font-size: 0.875rem;
      color: #64748b;
    }
  </style>
</head>
<body>
  <h1>Welcome to Artest</h1>
  <p>A simple landing page to get your project started. Edit this file and push your changes when you're ready.</p>
  <a href="https://github.com/globalmultitechltd/artest">View on GitHub</a>
  <footer>&copy; 2026 Artest</footer>
</body>
</html>
